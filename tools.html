<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職涯領航員 2.0 | 數位教具箱</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --primary: #58a6ff;
            --buff: #238636;
            --debuff: #da3633;
            --text: #c9d1d9;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            min-height: 100vh;
        }

        h1 { font-size: 1.1rem; opacity: 0.8; margin-bottom: 20px; color: var(--primary); letter-spacing: 1px; }

        .dice-section {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
        }

        .qty-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .qty-btn {
            background: #21262d;
            border: 1px solid var(--border);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
        }

        #diceQty { font-size: 1.5rem; font-weight: bold; width: 30px; }

        .dice-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .roll-btn {
            background: #21262d;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        #diceDisplay {
            margin-top: 20px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .individual-dice { font-size: 1rem; color: #8b949e; margin-bottom: 5px; }
        .dice-sum { font-size: 3rem; font-weight: bold; color: white; }

        .event-section {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .event-card {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 15px;
            padding: 30px 20px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .event-type-tag {
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 12px;
            align-self: center;
        }

        .tag-buff { background: var(--buff); color: white; }
        .tag-debuff { background: var(--debuff); color: white; }

        .event-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; }
        .event-desc { font-size: 1rem; line-height: 1.6; color: #c9d1d9; }

        .draw-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        .history { margin-top: 20px; font-size: 0.85rem; color: #484f58; }
    </style>
</head>
<body>

    <h1>CAREER PILOT 道具箱</h1>

    <div class="dice-section">
        <div style="font-size: 0.8rem; color: #8b949e; margin-bottom: 10px;">設定擲骰數量</div>
        <div class="qty-control">
            <button class="qty-btn" onclick="changeQty(-1)">-</button>
            <div id="diceQty">1</div>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
        <div class="dice-btns">
            <button class="roll-btn" onclick="rollDice(3)">D3 (基礎)</button>
            <button class="roll-btn" onclick="rollDice(6)">D6 (進階)</button>
        </div>
        <div id="diceDisplay">
            <div class="individual-dice" id="diceDetail">等待擲骰...</div>
            <div class="dice-sum" id="diceSum">-</div>
        </div>
    </div>

    <div class="event-section">
        <div class="event-card" id="eventCard">
            <div id="eventTag"></div>
            <div class="event-title" id="eventTitle">準備就緒</div>
            <div class="event-desc" id="eventDesc">請踩中【？事件格】的玩家點擊抽取</div>
        </div>
        <!-- 修正點：直接在 HTML 內填入 15 -->
        <button class="draw-btn" onclick="drawEvent()">抽取事件卡（剩餘: <span id="deckCount">15</span>）</button>
        <div class="history" id="history">尚未抽取</div>
    </div>

    <script>
        let currentQty = 1;
        function changeQty(v) {
            currentQty = Math.max(1, Math.min(4, currentQty + v));
            document.getElementById('diceQty').innerText = currentQty;
        }

        function rollDice(sides) {
            const detailEl = document.getElementById('diceDetail');
            const sumEl = document.getElementById('diceSum');
            let results = [];
            let sum = 0;
            for(let i=0; i<currentQty; i++) {
                let res = Math.floor(Math.random() * sides) + 1;
                results.push(res);
                sum += res;
            }
            detailEl.innerText = results.join(' + ');
            sumEl.innerText = sum;
            if (navigator.vibrate) navigator.vibrate(50);
        }

        const initialDeck = [
            { t: "資源補給", d: "將此卡保留。在您的「下一個回合」補牌時，手牌上限暫時提升至 9 張。", type: "buff" },
            { t: "資源補給", d: "將此卡保留。在您的「下一個回合」補牌時，手牌上限暫時提升至 9 張。", type: "buff" },
            { t: "資源補給", d: "將此卡保留。在您的「下一個回合」補牌時，手牌上限暫時提升至 9 張。", type: "buff" },
            { t: "爆品誕生", d: "直接獲得 +2 聲望。你可選擇將成果分給一位對手結盟，若這麼做，雙方聲望皆 +2。", type: "buff" },
            { t: "爆品誕生", d: "直接獲得 +2 聲望。你可選擇將成果分給一位對手結盟，若這麼做，雙方聲望皆 +2。", type: "buff" },
            { t: "爆品誕生", d: "直接獲得 +2 聲望。你可選擇將成果分給一位對手結盟，若這麼做，雙方聲望皆 +2。", type: "buff" },
            { t: "跨部門合作", d: "邀請一位對手結盟，若對方同意，雙方的經理人棋子直接前進 3 步，且雙方聲望各 +1。", type: "buff" },
            { t: "跨部門合作", d: "邀請一位對手結盟，若對方同意，雙方的經理人棋子直接前進 3 步，且雙方聲望各 +1。", type: "buff" },
            { t: "跨部門合作", d: "邀請一位對手結盟，若對方同意，雙方的經理人棋子直接前進 3 步，且雙方聲望各 +1。", type: "buff" },
            { t: "獵頭情報", d: "獲得一次「必勝」的獵頭機會（免擲骰奪走）；或必勝的防禦機會（被獵時免擲骰防禦）。", type: "buff" },
            { t: "突發技術瓶頸", d: "專案卡關耗費心神，在您的「下一個回合」補牌時，手牌上限暫時降為 4 張。", type: "debuff" },
            { t: "突發技術瓶頸", d: "專案卡關耗費心神，在您的「下一個回合」補牌時，手牌上限暫時降為 4 張。", type: "debuff" },
            { t: "部門預算縮減", d: "團隊士氣受打擊。你的主管聲望立刻 -1（可立刻打出「責備卡」抵銷）。", type: "debuff" },
            { t: "部門預算縮減", d: "團隊士氣受打擊。你的主管聲望立刻 -1（可立刻打出「責備卡」抵銷）。", type: "debuff" },
            { t: "核心員工倦怠", d: "您陣營中目前 D 等級最高的一名員工被強迫休假，下一個回合無法被派上場。", type: "debuff" }
        ];

        let currentDeck = [...initialDeck];

        // 修正點：定義更新函式
        function updateUI() {
            document.getElementById('deckCount').innerText = currentDeck.length;
        }

        // 修正點：主動呼叫一次
        updateUI();

        function drawEvent() {
            if (currentDeck.length === 0) {
                if(confirm("事件牌堆已抽完，要重新洗牌嗎？")) {
                    currentDeck = [...initialDeck];
                    updateUI();
                    return;
                } else { return; }
            }

            const cardEl = document.getElementById('eventCard');
            const titleEl = document.getElementById('eventTitle');
            const descEl = document.getElementById('eventDesc');
            const tagEl = document.getElementById('eventTag');
            const historyEl = document.getElementById('history');

            const index = Math.floor(Math.random() * currentDeck.length);
            const card = currentDeck.splice(index, 1)[0];
            
            titleEl.innerText = card.t;
            descEl.innerText = card.d;
            tagEl.innerText = card.type === 'buff' ? '🟢 個人機遇與增益' : '🔴 個人挑戰與危機';
            tagEl.className = 'event-type-tag ' + (card.type === 'buff' ? 'tag-buff' : 'tag-debuff');
            cardEl.style.borderColor = card.type === 'buff' ? 'var(--buff)' : 'var(--debuff)';
            
            historyEl.innerText = "上次抽取： " + card.t;
            updateUI();

            cardEl.style.transform = "scale(0.95)";
            setTimeout(() => { cardEl.style.transform = "scale(1)"; }, 100);
        }
    </script>
</body>
</html>
