<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Career Pilot | Manager Console</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 初始入職畫面 -->
<div id="setupScreen" class="overlay flex-center">
    <div class="setup-card">
        <h1>經理人系統初始化</h1>
        <p>請輸入您的職稱/姓名</p>
        <input type="text" id="playerName" placeholder="例如：經理人 Jeremy" class="input-field">
        <button onclick="initManager()" class="primary-btn" style="margin-top:20px;">啟動管理面板</button>
    </div>
</div>

<header>
    <div id="managerTitle">系統載入中...</div>
    <div class="status-bar">
        <span class="dot"></span> 連線中 | 專案進度：OK
    </div>
</header>

<main id="employeeList">
    <!-- 員工卡片會動態生成於此 -->
</main>

<!-- 核心：雙重行動掃描器 (預留鏡頭框) -->
<div id="scannerOverlay" class="overlay flex-center" style="display:none;">
    <div class="scanner-container">
        <div class="scanner-header">
            <h3>領導行動診斷中...</h3>
            <p>請將「指令卡」與「支持卡」並排放入框內</p>
        </div>
        
        <div class="viewfinder-group">
            <div class="viewfinder" id="vf-directive">
                <div class="label">指令卡 (I)</div>
                <div class="scan-line"></div>
                <input type="text" id="manual-I" placeholder="輸入代碼" class="mini-input">
            </div>
            <div class="viewfinder" id="vf-supportive">
                <div class="label">支持卡 (S)</div>
                <div class="scan-line"></div>
                <input type="text" id="manual-S" placeholder="輸入代碼" class="mini-input">
            </div>
        </div>

        <div class="scanner-footer">
            <button onclick="processScan()" class="primary-btn">確認掃描組合</button>
            <button onclick="closeScanner()" class="secondary-btn">取消返回</button>
        </div>
    </div>
</div>

<!-- 側欄與彈窗保持原樣但邏輯優化 -->
<div class="fab" onclick="toggleSidebar()">🛠️ 地圖工具</div>
<div id="sidebar" class="sidebar">
    <div class="sidebar-header"><h3>地圖工具箱</h3><button onclick="toggleSidebar()">✕</button></div>
    <div class="sidebar-content">
        <button class="tool-btn" onclick="triggerEvent()">🎲 踩中【？事件格】</button>
        <button class="tool-btn" onclick="triggerD2()">🚩 跨越 D2 檢查點</button>
        <button class="tool-btn" onclick="triggerPromotion()">🆙 進入【晉升格】</button>
        <button class="tool-btn" onclick="addEmployee()">➕ 招募第二位員工</button>
    </div>
</div>

<div id="modalOverlay" class="overlay flex-center" style="display:none;">
    <div class="modal">
        <h2 id="modalTitle"></h2>
        <div id="modalContent" class="modal-body"></div>
        <button class="primary-btn" onclick="closeModal()">確認</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
