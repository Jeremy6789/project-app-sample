<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情境領導 3.0 助手</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>

    <div class="app-container">
        <!-- 底部切換導覽 -->
        <nav class="bottom-nav">
            <button onclick="showPage('task')">📋 任務掃描</button>
            <button onclick="showPage('admin')">💼 行政挑戰</button>
            <button onclick="showPage('tools')">🎲 工具箱</button>
        </nav>

        <!-- 頁面 1: 任務掃描 -->
        <section id="page-task" class="page">
            <h2>每回合任務查詢</h2>
            <div id="task-scanner-zone">
                <p>請輸入任務卡編號 (1-10)</p>
                <div class="input-row">
                    <input type="number" id="task-id" placeholder="任務編號" min="1" max="10">
                    <button class="primary-btn" onclick="lookupTask()">查看情境與解答</button>
                </div>
            </div>
            <div id="task-result" class="result-card" style="display:none;"></div>
        </section>

        <!-- 頁面 2: 行政挑戰 -->
        <section id="page-admin" class="page" style="display:none;">
            <h2>行政挑戰核對</h2>
            <p>請輸入行政挑戰卡代碼</p>
            <input type="text" id="admin-id" placeholder="例如：A05">
            <button class="primary-btn" onclick="lookupAdmin()">核對解答</button>
            <div id="admin-result" class="result-card" style="display:none;"></div>
        </section>

        <!-- 頁面 3: 工具箱 (由之前的 tools.html 整合) -->
        <section id="page-tools" class="page" style="display:none;">
            <iframe src="tools.html" frameborder="0" style="width:100%; height:80vh;"></iframe>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
